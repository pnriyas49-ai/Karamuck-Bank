<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Swirl Symbol -->
  <g transform="translate(10, 10) scale(0.9)">
    <!-- Outer swoosh - Red -->
    <path d="M55 20 C80 5, 105 15, 100 45 C95 70, 65 85, 40 75" stroke="#D42426" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Middle swoosh - Gold -->
    <path d="M50 30 C70 18, 90 25, 87 48 C84 65, 62 75, 45 68" stroke="#F5A623" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- Inner swoosh - Green -->
    <path d="M48 40 C62 32, 78 36, 75 50 C72 62, 58 68, 48 62" stroke="#1B7B2C" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="60" cy="50" r="4" fill="#D42426"/>
  </g>
  <!-- Estd. 1916 -->
  <text x="55" y="105" text-anchor="middle" font-family="serif" font-size="11" fill="#1B7B2C" font-style="italic">Estd. 1916</text>
  <!-- Bank Name -->
  <text x="145" y="38" font-family="sans-serif" font-weight="900" font-size="28" fill="#D42426">Karamuck</text>
  <text x="145" y="62" font-family="sans-serif" font-weight="700" font-size="22" fill="#D42426">Service</text>
  <text x="145" y="84" font-family="sans-serif" font-weight="700" font-size="22" fill="#D42426">Co-operative</text>
  <text x="145" y="108" font-family="sans-serif" font-weight="900" font-size="28" fill="#1B7B2C">Bank Ltd</text>
</svg>
